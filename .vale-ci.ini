StylesPath = "vale/styles"

MinAlertLevel = suggestion

[*.{md,mdx}]
BasedOnStyles = Temporal

; Only enable the two rules we want in CI
Temporal.badwords = NO
Temporal.complexwords = NO
Temporal.programming = NO
Temporal.WordList = NO

; ignore bare file-path link text, e.g. [strands-agents/src/worker.ts](url)
TokenIgnores = (\[[\w./-]*\.\w+\])

[formats]
mdx = md
