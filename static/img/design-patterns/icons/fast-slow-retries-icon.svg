<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80">
  <!-- Timeline -->
  <line x1="6" y1="52" x2="94" y2="52" stroke="#888" stroke-width="2" stroke-linecap="round"/>

  <!-- Fast retries: tightly spaced ticks -->
  <line x1="10" y1="52" x2="10" y2="34" stroke="#888" stroke-width="2" stroke-linecap="round"/>
  <line x1="17" y1="52" x2="17" y2="34" stroke="#888" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="52" x2="24" y2="34" stroke="#888" stroke-width="2" stroke-linecap="round"/>
  <line x1="31" y1="52" x2="31" y2="34" stroke="#888" stroke-width="2" stroke-linecap="round"/>

  <!-- Switch point -->
  <line x1="42" y1="58" x2="42" y2="28" stroke="#cc2222" stroke-width="2" stroke-linecap="round"/>

  <!-- Slow retries: widely spaced ticks -->
  <line x1="54" y1="52" x2="54" y2="34" stroke="#888" stroke-width="2" stroke-linecap="round"/>
  <line x1="72" y1="52" x2="72" y2="34" stroke="#888" stroke-width="2" stroke-linecap="round"/>
  <line x1="90" y1="52" x2="90" y2="34" stroke="#888" stroke-width="2" stroke-linecap="round"/>
</svg>
