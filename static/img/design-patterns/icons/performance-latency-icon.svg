<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80">
  <!-- Speedometer dial -->
  <path d="M 20 56 A 30 30 0 0 1 80 56" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round"/>

  <!-- High-speed (low-latency) zone -->
  <path d="M 64 33 A 30 30 0 0 1 80 56" fill="none" stroke="#cc2222" stroke-width="3" stroke-linecap="round"/>

  <!-- Tick marks -->
  <line x1="20" y1="56" x2="26" y2="56" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="29" y1="41" x2="34" y2="44" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="26" x2="50" y2="32" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Needle pointing to high performance -->
  <line x1="50" y1="56" x2="68" y2="40" stroke="#cc2222" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="50" cy="56" r="4" fill="#888"/>
</svg>
