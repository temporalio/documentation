<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80">
  <!-- Tree edges -->
  <line x1="50" y1="14" x2="28" y2="40" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="14" x2="72" y2="40" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="40" x2="14" y2="66" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="40" x2="38" y2="66" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="72" y1="40" x2="62" y2="66" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="72" y1="40" x2="86" y2="66" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Root (map/reduce coordinator) -->
  <circle cx="50" cy="14" r="8" fill="none" stroke="#cc2222" stroke-width="2"/>

  <!-- Intermediate nodes -->
  <circle cx="28" cy="40" r="6" fill="none" stroke="#888" stroke-width="1.5"/>
  <circle cx="72" cy="40" r="6" fill="none" stroke="#888" stroke-width="1.5"/>

  <!-- Leaf workers -->
  <circle cx="14" cy="66" r="5" fill="none" stroke="#888" stroke-width="1.5"/>
  <circle cx="38" cy="66" r="5" fill="none" stroke="#888" stroke-width="1.5"/>
  <circle cx="62" cy="66" r="5" fill="none" stroke="#888" stroke-width="1.5"/>
  <circle cx="86" cy="66" r="5" fill="none" stroke="#888" stroke-width="1.5"/>
</svg>
