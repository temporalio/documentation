<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80">
  <!-- Worker process boundary -->
  <rect x="12" y="20" width="76" height="40" rx="4" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Workflow -->
  <rect x="22" y="32" width="16" height="16" rx="3" fill="none" stroke="#888" stroke-width="2"/>
  <line x1="26" y1="37" x2="34" y2="37" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="43" x2="34" y2="43" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>

  <!-- In-process (local) call, no task-queue hop -->
  <line x1="40" y1="40" x2="50" y2="40" stroke="#cc2222" stroke-width="2" stroke-linecap="round"/>
  <polygon points="51,36 55,40 51,44" fill="#cc2222"/>

  <!-- Local activity (gear) co-located in the same process -->
  <circle cx="66" cy="40" r="6" fill="none" stroke="#cc2222" stroke-width="2"/>
  <circle cx="66" cy="40" r="1.5" fill="#cc2222"/>
  <g stroke="#cc2222" stroke-width="2.5" stroke-linecap="round">
    <line x1="71" y1="40" x2="75" y2="40"/>
    <line x1="69.5" y1="43.5" x2="72.4" y2="46.4"/>
    <line x1="66" y1="45" x2="66" y2="49"/>
    <line x1="62.5" y1="43.5" x2="59.6" y2="46.4"/>
    <line x1="61" y1="40" x2="57" y2="40"/>
    <line x1="62.5" y1="36.5" x2="59.6" y2="33.6"/>
    <line x1="66" y1="35" x2="66" y2="31"/>
    <line x1="69.5" y1="36.5" x2="72.4" y2="33.6"/>
  </g>
</svg>
