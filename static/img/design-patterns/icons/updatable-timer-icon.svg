  <circle cx="40" cy="40" r="22" fill="none" stroke="#888" stroke-width="2"/>
  <line x1="40" y1="40" x2="40" y2="26" stroke="#888" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="40" x2="52" y2="46" stroke="#888" stroke-width="2" stroke-linecap="round"/>

  <!-- Timer being extended (red arc) -->
