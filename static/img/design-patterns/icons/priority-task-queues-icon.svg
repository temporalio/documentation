<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80">
  <!-- Priority 1 item (highest priority, red) -->
  <rect x="6" y="6" width="58" height="20" rx="4" fill="none" stroke="#cc2222" stroke-width="2"/>
  <circle cx="18" cy="16" r="5" fill="#cc2222"/>

  <!-- Priority 2 item (grey) -->
  <rect x="6" y="30" width="58" height="20" rx="4" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <circle cx="18" cy="40" r="4.5" fill="#aaa"/>

  <!-- Priority 3 item (lighter grey) -->
  <rect x="6" y="54" width="58" height="20" rx="4" fill="none" stroke="#bbb" stroke-width="1.5"/>
  <circle cx="18" cy="64" r="4.5" fill="#bbb"/>

  <!-- Arrow: priority 1 is dispatched first -->
  <line x1="67" y1="16" x2="84" y2="16" stroke="#cc2222" stroke-width="2" stroke-linecap="round"/>
  <polygon points="82,13 90,16 82,19" fill="#cc2222"/>
</svg>
