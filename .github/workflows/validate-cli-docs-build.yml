name: Validate CLI Docs Build

# Runs a real Docusaurus build whenever the generated CLI command reference
# changes. The CLI docs are auto-generated MDX (see the "CLI Docs Update"
# workflow), and MDX is stricter than plain Markdown: angle-bracket placeholders,
# JSON-in-braces, and broken anchors that render fine locally can fail the site
# build. Because the site sets onBrokenLinks and onBrokenAnchors to 'throw', this
# build is the ground truth for verifying the pages actually work with Docusaurus.

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'docs/cli/**'
      - '.github/workflows/validate-cli-docs-build.yml'

permissions:
  contents: read

jobs:
  build:
    name: Docusaurus build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build site
        run: yarn build
